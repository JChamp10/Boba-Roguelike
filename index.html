<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boba Roguelike</title>
    <style>
        :root {
            --boba-bg: #070b14;
            --boba-panel: #101827;
            --boba-panel-deep: #07111d;
            --boba-cream: #fff4d6;
            --boba-muted: #b8c9d8;
            --boba-aqua: #58ddff;
            --boba-pink: #ff6fb0;
            --boba-green: #83f28f;
            --boba-gold: #ffd86f;
            --boba-purple: #c99af7;
            --boba-danger: #ff5368;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: hidden;
            background-color: var(--boba-bg);
            background:
                radial-gradient(circle at 18% 10%, color-mix(in srgb, var(--boba-aqua) 20%, transparent), transparent 32%),
                radial-gradient(circle at 82% 88%, color-mix(in srgb, var(--boba-pink) 18%, transparent), transparent 34%),
                linear-gradient(135deg, #05070d, var(--boba-bg) 54%, #090713);
        }
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-root {
            width: 100vw;
            height: 100dvh;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100dvh;
            margin: 0 auto;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 24px rgba(88, 221, 255, 0.16));
        }
        #boot-status {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            color: #fff4d6;
            font-family: Arial, sans-serif;
            font-weight: 800;
            letter-spacing: 1px;
            background: var(--boba-bg);
            z-index: 10;
        }
        #profile-tools {
            position: fixed;
            left: 14px;
            bottom: 14px;
            z-index: 8;
            width: min(420px, calc(100vw - 28px));
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 8px;
            align-items: end;
            color: var(--boba-cream);
            font-family: Arial, sans-serif;
            pointer-events: auto;
        }
        .profile-name {
            display: grid;
            gap: 4px;
        }
        .profile-name label {
            color: var(--boba-aqua);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.8px;
        }
        #profile-username,
        #save-code-text {
            border: 2px solid rgba(56, 217, 255, 0.7);
            border-radius: 8px;
            color: var(--boba-cream);
            background: rgba(10, 18, 28, 0.96);
            outline: none;
            box-shadow: 0 0 18px rgba(88, 221, 255, 0.14);
        }
        #profile-username {
            min-height: 38px;
            padding: 0 10px;
            font-weight: 900;
        }
        #profile-tools button,
        .save-code-actions button {
            min-height: 38px;
            border: 2px solid var(--boba-aqua);
            border-radius: 8px;
            padding: 0 12px;
            color: var(--boba-cream);
            background: rgba(16, 35, 53, 0.94);
            font-weight: 900;
            cursor: pointer;
            transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
        }
        #profile-tools button:hover,
        .save-code-actions button:hover {
            transform: translateY(-1px);
            border-color: var(--boba-gold);
            background: rgba(31, 69, 96, 0.98);
        }
        #profile-tools button:active,
        .save-code-actions button:active {
            transform: translateY(1px) scale(0.98);
        }
        #profile-message {
            grid-column: 1 / -1;
            min-height: 16px;
            color: var(--boba-green);
            font-size: 11px;
            font-weight: 800;
        }
        #profile-message[data-state="bad"] {
            color: var(--boba-danger);
        }
        #save-code-panel {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: center;
            padding: 18px;
            color: var(--boba-cream);
            font-family: Arial, sans-serif;
            background: rgba(3, 6, 12, 0.76);
        }
        #save-code-panel.hidden {
            display: none;
        }
        .save-code-card {
            width: min(680px, 100%);
            border: 2px solid var(--boba-aqua);
            border-radius: 8px;
            padding: 18px;
            background: rgba(10, 18, 28, 0.98);
            box-shadow: 0 0 34px rgba(88, 221, 255, 0.20);
        }
        .save-code-card h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        #save-code-text {
            width: 100%;
            min-height: 180px;
            padding: 12px;
            resize: vertical;
            font-family: Consolas, monospace;
            font-size: 12px;
        }
        .save-code-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 12px;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 560px), (max-height: 620px) {
            #profile-tools {
                grid-template-columns: 1fr 1fr;
            }
            .profile-name {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>
    <div id="game-root"></div>
    <div id="boot-status">LOADING BOBA ROGUELIKE...</div>
    <div id="profile-tools">
        <div class="profile-name">
            <label for="profile-username">LEADERBOARD NAME</label>
            <input id="profile-username" maxlength="24" autocomplete="nickname" spellcheck="false" placeholder="3+ chars">
        </div>
        <button id="save-export" type="button">EXPORT</button>
        <button id="save-import" type="button">IMPORT</button>
        <div id="profile-message" role="status" aria-live="polite"></div>
    </div>
    <div id="save-code-panel" class="hidden">
        <div class="save-code-card">
            <h2 id="save-code-title">SAVE CODE</h2>
            <textarea id="save-code-text" spellcheck="false"></textarea>
            <div class="save-code-actions">
                <button id="save-code-apply" type="button">IMPORT SAVE</button>
                <button id="save-code-close" type="button">CLOSE</button>
            </div>
        </div>
    </div>
    <script src="js/auth-client.js"></script>
    <script>
        (function () {
            var bootStatus = document.getElementById('boot-status');

            function setBootStatus(message) {
                if (bootStatus) {
                    bootStatus.textContent = message;
                }
            }

            window.addEventListener('error', function (event) {
                var filename = event.filename ? String(event.filename).split('/').pop() : '';
                var location = filename ? ' @ ' + filename + ':' + event.lineno : '';
                setBootStatus('BOOT ERROR: ' + (event.message || 'CHECK CONSOLE') + location);
            });

            window.addEventListener('unhandledrejection', function (event) {
                var reason = event.reason || {};
                var message = reason.message || reason.stack || String(reason);
                setBootStatus('BOOT ERROR: ' + (message || 'PROMISE REJECTION'));
            });

            // GITHUB PAGES: change this if the repo owner/name or default branch changes.
            var githubCdnBase = 'https://cdn.jsdelivr.net/gh/JChamp10/Boba-Roguelike@main/';

            function absoluteUrl(src) {
                return new URL(src, document.baseURI || window.location.href).href;
            }

            function withCacheBust(src) {
                if (window.location.protocol === 'file:' && !/^https?:\/\//i.test(src)) return src;
                var separator = src.indexOf('?') === -1 ? '?' : '&';
                return src + separator + 'v=' + Date.now();
            }

            function scriptSources(src) {
                var sources = [withCacheBust(src), src];
                sources.push(withCacheBust(githubCdnBase + src));
                sources.push(githubCdnBase + src);

                return sources.filter(function (source, index) {
                    return sources.indexOf(source) === index;
                });
            }

            function loadScript(src, done) {
                var sources = Array.isArray(src) ? src.slice() : [src];
                var attempt = 0;

                function tryNext() {
                    var source = sources[attempt++];
                    var displaySource = source ? absoluteUrl(source) : absoluteUrl(sources[sources.length - 1]);

                    if (!source) {
                        setBootStatus('FAILED TO LOAD ' + displaySource);
                        if (done) done();
                        return;
                    }

                    var script = document.createElement('script');
                    script.src = source;
                    script.onload = done;
                    script.onerror = function () {
                        script.remove();
                        tryNext();
                    };
                    document.body.appendChild(script);
                }

                tryNext();
            }

            function loadScriptsInOrder(scripts, done) {
                var index = 0;

                function next() {
                    var script = scripts[index++];
                    if (!script) {
                        if (done) done();
                        return;
                    }

                    setBootStatus(script.status);
                    loadScript(scriptSources(script.src), next);
                }

                next();
            }

            function loadGame() {
                setBootStatus('STARTING GAME...');
                loadScript(scriptSources('js/game.js'));
            }

            function startGame() {
                loadScriptsInOrder([
                    { src: 'vendor/phaser.min.js', status: 'LOADING PHASER...' },
                    { src: 'js/GameState.js', status: 'LOADING GAME STATE...' },
                    { src: 'js/embedded-assets.js', status: 'LOADING EMBEDDED ASSETS...' }
                ], loadGame);
            }

            if (window.BobaAuth) {
                window.BobaAuth.init({
                    onReady: startGame,
                    setStatus: setBootStatus
                });
            } else {
                startGame();
            }
        }());
    </script>

</body>
</html>
