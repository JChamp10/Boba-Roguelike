<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boba Roguelike</title>
    <style>
        :root {
            --boba-bg: #070b14;
            --boba-panel: #101827;
            --boba-panel-deep: #07111d;
            --boba-cream: #fff4d6;
            --boba-muted: #b8c9d8;
            --boba-aqua: #58ddff;
            --boba-pink: #ff6fb0;
            --boba-green: #83f28f;
            --boba-gold: #ffd86f;
            --boba-purple: #c99af7;
            --boba-danger: #ff5368;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: hidden;
            background-color: var(--boba-bg);
            background:
                radial-gradient(circle at 18% 10%, color-mix(in srgb, var(--boba-aqua) 20%, transparent), transparent 32%),
                radial-gradient(circle at 82% 88%, color-mix(in srgb, var(--boba-pink) 18%, transparent), transparent 34%),
                linear-gradient(135deg, #05070d, var(--boba-bg) 54%, #090713);
        }
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-root {
            width: 100vw;
            height: 100dvh;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100dvh;
            margin: 0 auto;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 24px rgba(88, 221, 255, 0.16));
        }
        #boot-status {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            color: #fff4d6;
            font-family: Arial, sans-serif;
            font-weight: 800;
            letter-spacing: 1px;
            background: var(--boba-bg);
            z-index: 10;
        }
        #auth-gate {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            padding: 24px;
            color: #fff4d6;
            font-family: Arial, sans-serif;
            background:
                linear-gradient(rgba(4, 8, 15, 0.84), rgba(4, 8, 15, 0.92)),
                radial-gradient(circle at 22% 18%, rgba(56, 217, 255, 0.18), transparent 34%),
                radial-gradient(circle at 78% 80%, rgba(255, 95, 162, 0.14), transparent 34%),
                var(--boba-bg);
        }
        .auth-panel {
            width: min(430px, 100%);
            border: 2px solid rgba(56, 217, 255, 0.7);
            border-radius: 8px;
            padding: 28px;
            background: rgba(10, 18, 28, 0.96);
            background: color-mix(in srgb, var(--boba-panel) 94%, black);
            box-shadow: 0 0 32px rgba(56, 217, 255, 0.18), inset 0 0 22px rgba(255, 184, 75, 0.06);
        }
        .auth-panel h1 {
            margin-bottom: 6px;
            font-size: 34px;
            line-height: 1;
            color: #fff4d6;
            font-weight: 900;
        }
        .auth-panel p {
            margin-bottom: 18px;
            color: #b8c9d8;
            font-size: 14px;
        }
        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .auth-tab,
        .auth-panel button {
            min-height: 42px;
            border: 1px solid rgba(126, 210, 255, 0.7);
            border-radius: 6px;
            color: #fff7e6;
            background: #102335;
            font-weight: 900;
            cursor: pointer;
        }
        .auth-tab[aria-selected="true"] {
            color: #08111b;
            background: #7ed2ff;
        }
        .auth-panel label {
            display: block;
            margin: 12px 0 6px;
            color: #ffe7b3;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }
        .auth-panel input {
            width: 100%;
            min-height: 42px;
            border: 1px solid rgba(126, 210, 255, 0.45);
            border-radius: 6px;
            padding: 0 12px;
            color: #fff7e6;
            background: #07111d;
            outline: none;
        }
        .auth-panel input:focus {
            border-color: #7ed2ff;
            box-shadow: 0 0 0 3px rgba(126, 210, 255, 0.14);
        }
        .auth-api-row {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(126, 210, 255, 0.18);
        }
        .auth-api-row label {
            color: #9fd7ff;
        }
        .auth-actions {
            display: grid;
            gap: 10px;
            margin-top: 18px;
        }
        .auth-primary {
            border-color: #f6b84b !important;
            color: #151006 !important;
            background: #f6b84b !important;
        }
        .auth-secondary {
            border-color: #7ed2ff !important;
            color: #dff4ff !important;
            background: rgba(9, 20, 34, 0.92) !important;
        }
        #auth-message {
            min-height: 20px;
            margin-top: 14px;
            color: #ffb3b3;
            font-size: 13px;
            font-weight: 800;
        }
        .auth-hidden {
            display: none !important;
        }
        .auth-panel[data-mode="session"] .auth-tabs,
        .auth-panel[data-mode="session"] .auth-fields {
            display: none;
        }
        @media (max-width: 560px), (max-height: 620px) {
            #auth-gate {
                padding: 12px;
            }
            .auth-panel {
                padding: 18px;
            }
            .auth-panel h1 {
                font-size: 26px;
            }
            .auth-panel input,
            .auth-tab,
            .auth-panel button {
                min-height: 38px;
            }
        }
    </style>
</head>
<body>
    <div id="game-root"></div>
    <div id="boot-status">LOADING BOBA ROGUELIKE...</div>
    <div id="auth-gate">
        <form class="auth-panel" id="auth-form" action="javascript:void(0)" novalidate>
            <h1>BOBA LOGIN</h1>
            <p>Sign in to sync your save before the run starts.</p>
            <div class="auth-tabs" role="tablist">
                <button class="auth-tab" id="auth-login-tab" type="button" aria-selected="true">LOGIN</button>
                <button class="auth-tab" id="auth-signup-tab" type="button" aria-selected="false">SIGN UP</button>
            </div>
            <div class="auth-fields">
                <div id="auth-username-wrap" class="auth-hidden">
                    <label for="auth-username">USERNAME</label>
                    <input id="auth-username" name="username" autocomplete="username" minlength="3" maxlength="24">
                </div>
                <label for="auth-login">EMAIL OR USERNAME</label>
                <input id="auth-login" name="login" autocomplete="email" required>
                <label for="auth-password">PASSWORD</label>
                <input id="auth-password" name="password" type="password" autocomplete="current-password" minlength="8" required>
                <div class="auth-api-row">
                    <label for="auth-api-url">RENDER API URL</label>
                    <input id="auth-api-url" name="apiUrl" autocomplete="off" spellcheck="false">
                </div>
            </div>
            <div class="auth-actions">
                <button class="auth-primary" id="auth-submit" type="submit">LOGIN</button>
                <button class="auth-secondary auth-hidden" id="auth-switch" type="button">SWITCH ACCOUNT</button>
            </div>
            <div id="auth-message" role="status" aria-live="polite"></div>
        </form>
    </div>
    <script src="js/auth-client.js"></script>
    <script>
        (function () {
            var bootStatus = document.getElementById('boot-status');

            function setBootStatus(message) {
                if (bootStatus) {
                    bootStatus.textContent = message;
                }
            }

            window.addEventListener('error', function (event) {
                var filename = event.filename ? String(event.filename).split('/').pop() : '';
                var location = filename ? ' @ ' + filename + ':' + event.lineno : '';
                setBootStatus('BOOT ERROR: ' + (event.message || 'CHECK CONSOLE') + location);
            });

            window.addEventListener('unhandledrejection', function (event) {
                var reason = event.reason || {};
                var message = reason.message || reason.stack || String(reason);
                setBootStatus('BOOT ERROR: ' + (message || 'PROMISE REJECTION'));
            });

            // GITHUB PAGES: change this if the repo owner/name or default branch changes.
            var githubCdnBase = 'https://cdn.jsdelivr.net/gh/JChamp10/Boba-Roguelike@main/';

            function absoluteUrl(src) {
                return new URL(src, document.baseURI || window.location.href).href;
            }

            function withCacheBust(src) {
                if (window.location.protocol === 'file:' && !/^https?:\/\//i.test(src)) return src;
                var separator = src.indexOf('?') === -1 ? '?' : '&';
                return src + separator + 'v=' + Date.now();
            }

            function scriptSources(src) {
                var sources = [withCacheBust(src), src];
                sources.push(withCacheBust(githubCdnBase + src));
                sources.push(githubCdnBase + src);

                return sources.filter(function (source, index) {
                    return sources.indexOf(source) === index;
                });
            }

            function loadScript(src, done) {
                var sources = Array.isArray(src) ? src.slice() : [src];
                var attempt = 0;

                function tryNext() {
                    var source = sources[attempt++];
                    var displaySource = source ? absoluteUrl(source) : absoluteUrl(sources[sources.length - 1]);

                    if (!source) {
                        setBootStatus('FAILED TO LOAD ' + displaySource);
                        if (done) done();
                        return;
                    }

                    var script = document.createElement('script');
                    script.src = source;
                    script.onload = done;
                    script.onerror = function () {
                        script.remove();
                        tryNext();
                    };
                    document.body.appendChild(script);
                }

                tryNext();
            }

            function loadScriptsInOrder(scripts, done) {
                var index = 0;

                function next() {
                    var script = scripts[index++];
                    if (!script) {
                        if (done) done();
                        return;
                    }

                    setBootStatus(script.status);
                    loadScript(scriptSources(script.src), next);
                }

                next();
            }

            function loadGame() {
                setBootStatus('STARTING GAME...');
                loadScript(scriptSources('js/game.js'));
            }

            function startGameAfterLogin() {
                loadScriptsInOrder([
                    { src: 'vendor/phaser.min.js', status: 'LOADING PHASER...' },
                    { src: 'js/GameState.js', status: 'LOADING GAME STATE...' },
                    { src: 'js/embedded-assets.js', status: 'LOADING EMBEDDED ASSETS...' }
                ], loadGame);
            }

            if (window.BobaAuth) {
                window.BobaAuth.init({
                    onReady: startGameAfterLogin,
                    setStatus: setBootStatus
                });
            } else {
                setBootStatus('BOOT ERROR: AUTH CLIENT MISSING');
            }
        }());
    </script>

</body>
</html>
