<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boba Roguelike</title>
    <script src="vendor/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: hidden;
            background-color: #0a0a0f;
        }
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-root {
            width: 100vw;
            height: 100dvh;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100dvh;
            margin: 0 auto;
        }
        #boot-status {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            color: #fff4d6;
            font-family: Arial, sans-serif;
            font-weight: 800;
            letter-spacing: 1px;
            background: #0a0a0f;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="game-root"></div>
    <div id="boot-status">LOADING BOBA ROGUELIKE...</div>
    <script>
        (function () {
            var bootStatus = document.getElementById('boot-status');

            window.setBootStatus = function (message) {
                if (bootStatus) {
                    bootStatus.textContent = message;
                }
            };

            window.addEventListener('error', function (event) {
                var filename = event.filename ? String(event.filename).split('/').pop() : '';
                var location = filename ? ' @ ' + filename + ':' + event.lineno : '';
                window.setBootStatus('BOOT ERROR: ' + (event.message || 'CHECK CONSOLE') + location);
            });

            window.addEventListener('unhandledrejection', function (event) {
                var reason = event.reason || {};
                var message = reason.message || reason.stack || String(reason);
                window.setBootStatus('BOOT ERROR: ' + (message || 'PROMISE REJECTION'));
            });

            window.setBootStatus('LOADING EMBEDDED ASSETS...');
        }());
    </script>
    <script src="js/GameState.js" onerror="window.setBootStatus('FAILED TO LOAD js/GameState.js')"></script>
    <script src="js/embedded-assets.js" onload="window.setBootStatus('STARTING GAME...')" onerror="window.setBootStatus('FAILED TO LOAD js/embedded-assets.js')"></script>
    <script src="js/game.js" onerror="window.setBootStatus('FAILED TO LOAD js/game.js')"></script>

</body>
</html>
